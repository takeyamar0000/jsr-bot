name: Evening Brief (Weekday JP AI + Claude Code Tips)

on:
  schedule:
    - cron: '57 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Evening Brief
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          PROMPT="あなたはアベリアの夕方のAI情報担当です。研修生・AI初心者・一般人に向けて、今日1日の日本のAI動向と、Claude Codeの便利な使い方を1つ紹介してください。

          【書き方のルール】
          - 専門用語を避け、使うなら必ず日本語で説明を添える
          - Claude Codeの説明は『AIと会話しながらパソコン作業を頼めるツール』のように噛み砕く
          - 『今日ちょっと試してみようかな』と思わせるトーン
          - 具体的な場面で『例えば〇〇の時に役立つ』を入れる

          【調査対象】過去24時間
          1. 日本のAI界隈で話題の動き
             - 日本のAI系X（Twitter）アカウント（深津貴之、安野貴博、shi3z 等）の注目投稿
             - Zenn・Qiitaの人気記事（AI関連）
             - 日本のAI企業・サービスのニュース
          2. Claude Codeの便利な使い方を1つ（初級〜中級、初心者でも真似しやすいもの）

          【出力フォーマット】

          🌙 **AI夕刊 - ${TODAY}**

          **🇯🇵 日本のAI話題**
          ・[話題]: [何が起きたか・なぜ面白いかを1-2行、優しく]
          ・[話題]: [同様に]
          （最大3件）

          **💎 今日のClaude Codeの技**

          **[技の名前や動作（20-30文字）]**
          [どんな場面で使えるかを『例えば〜』付きで2-4行。初心者が真似しやすく]

          （コマンドや操作例があれば、短いコードブロックで示す）

          ---
          💡 **今日のひとこと**: [30-50文字、今日の技を試す後押し]

          【絶対条件】
          - 全体1500文字以内
          - 参考URL・ソース一覧書かない
          - 不確かな情報は書かない
          - Claude Codeの技は1つだけ"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > brief.txt

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 << 'PYEOF' > brief-clean.txt
          with open('brief.txt', 'r', encoding='utf-8') as f:
              text = f.read().strip()
          for marker in ['Sources:', 'Source:', '参考:', '参考URL:', '引用:', 'References:']:
              idx = text.find(marker)
              if idx > 0:
                  text = text[:idx].rstrip()
                  break
          if len(text) > 1900:
              text = text[:1897] + '...'
          import sys
          sys.stdout.write(text)
          PYEOF
          mv brief-clean.txt brief.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_BRIEF }}
        run: |
          CONTENT=$(jq -Rs . < brief.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"
