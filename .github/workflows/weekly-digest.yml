name: Weekly Digest (Sunday)

on:
  schedule:
    - cron: '57 10 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Weekly Digest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          WEEK_END=$(date -u -d '+9 hours' '+%Y-%m-%d')
          WEEK_START=$(date -u -d '+9 hours -6 days' '+%Y-%m-%d')
          PROMPT="あなたはアベリアの『今週のAI総まとめ』担当です。研修生・AI初心者・一般人に向けて、過去7日間（${WEEK_START}〜${WEEK_END}）に世界で起きたAIの重要ニュースを、分かりやすくまとめてください。

          【書き方のルール】
          - 専門用語は最小限。カタカナは括弧で日本語説明を添える
          - 『例えば〜』『要するに〜』の比喩を積極的に
          - ニュースを並べるだけでなく『だから何がすごいのか』『私たちに何が起きるのか』を添える
          - 初めてAIニュース読む人でも『なるほど、今AI業界はこんな感じなんだ』と分かる内容

          【調査対象】過去7日間
          - 大手AI企業（Anthropic、OpenAI、Google等）の重要発表
          - 話題になった新しいAI機能やサービス
          - 日本のAI界隈の動き
          - AI研究の注目発見

          【出力フォーマット】

          📅 **今週のAI総まとめ** | ${WEEK_START}〜${WEEK_END}

          **🏆 今週、特に驚いた3大ニュース**
          1. **[見出し]**
             [何が起きたか + つまり何がすごいのかを2行で]
          2. **[見出し]**
             [同様に]
          3. **[見出し]**
             [同様に]

          **🔑 初心者が押さえておくと良い3つのポイント**
          ・[ポイント1]: [1行で、分かりやすく]
          ・[ポイント2]: [1行]
          ・[ポイント3]: [1行]

          **🎯 来週、ちょっと試してほしいこと**
          [60-100文字、Claude Codeやその他AIツールで実践できる小さなチャレンジを提案。『例えば〇〇してみる』のような具体的な話]

          ---
          💡 **オーナーからひとこと**: [30-50文字、研修生・読み手を鼓舞するメッセージ]

          【絶対条件】
          - 全体1500文字以内
          - 参考URL・ソース一覧書かない
          - 不確かな情報は書かない
          - 『今週のビッグニュース』は本当に重要だったもの3件に厳選"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > digest.txt

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 << 'PYEOF' > digest-clean.txt
          with open('digest.txt', 'r', encoding='utf-8') as f:
              text = f.read().strip()
          for marker in ['Sources:', 'Source:', '参考:', '参考URL:', '引用:', 'References:']:
              idx = text.find(marker)
              if idx > 0:
                  text = text[:idx].rstrip()
                  break
          if len(text) > 1900:
              text = text[:1897] + '...'
          import sys
          sys.stdout.write(text)
          PYEOF
          mv digest-clean.txt digest.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_WEEKLY }}
        run: |
          CONTENT=$(jq -Rs . < digest.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
