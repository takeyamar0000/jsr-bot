name: Auto Reply - Sage (Lv.2)

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分おき
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Check and Reply
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_BOT_TOKEN:       ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:      ${{ secrets.DISCORD_CHANNEL_CHAT_ID }}
          WEBHOOK:                 ${{ secrets.DISCORD_WEBHOOK_CHAT }}
        run: |
          unset ANTHROPIC_API_KEY
          python3 .github/scripts/auto_reply.py

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="ワークフロー失敗: Auto Reply - Sage / 実行ID: ${{ github.run_id }}"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": ${CONTENT}}" "$WEBHOOK"
