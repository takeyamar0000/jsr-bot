name: AI Debate Show (Lv.3)

on:
  schedule:
    - cron: '57 11 * * 3'   # JST 水曜 20:57
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch Today's Discord Content
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python3 .github/scripts/fetch_discord_content.py > discord_context.txt
          echo "Fetched $(wc -c < discord_context.txt) bytes from Discord"
          cat discord_context.txt

      - name: Generate Debate Script (JSON)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y年%-m月%-d日')
          DISCORD_CONTENT=$(cat discord_context.txt)
          PROMPT=$(cat <<ENDPROMPT
          あなたは3人のAIキャラクターによるリアルなディベートの脚本家です。

          キャラクター設定:
          - アイ（Ai）: 公平な司会者女の子。口調は「次はどうでしょう？」「まとめると？」「鋭い指摘ですね！」。明るくテンポよく進行。
          - ハル（Haru）: 肯定・賛成派女の子。口調は「〜という点で素晴らしいと思います」「データを見ると〜」。論理的で前向き。
          - レン（Ren）: 懐疑・批判派女の子。口調は「本当にそう？」「でも〜ではないですか？」「それ、楽観的すぎません？」。鋭く本質を突く。

          【本日のJsR Academy 投稿コンテキスト】
          以下は本日Discord に投稿された実際のAI情報です。この内容を元にディベートテーマを選び、具体的なニュースや事例を引用しながら議論してください。

          ${DISCORD_CONTENT}

          【ディベート生成ルール】
          - 上記コンテキストの中から最も論争になりうるテーマを1つ選ぶ
          - 具体的なニュース・数字・事例を会話に盛り込む（抽象論を避ける）
          - 純粋なJSONのみ出力。説明文・前置きは一切不要
          - 形式: [{"speaker": "Ai", "message": "..."}, ...]
          - 最初にアイがテーマを1〜2行で紹介する
          - 10〜14メッセージ（Ai→Haru→Ren→Ai→... の流れ）
          - 各メッセージ180字以内
          - 専門用語は括弧で解説、絵文字を自然に使用
          - 最後はNovaが「みなさんはどう思いますか？ 雑談チャンネルで教えてください！」で締める
          ENDPROMPT
          )
          claude -p "$PROMPT" > raw_debate.txt
          echo "Raw output length: $(wc -c < raw_debate.txt)"

      - name: Extract JSON
        run: |
          python3 .github/scripts/extract_json.py < raw_debate.txt > debate.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('debate.json'))))")
          echo "Messages: $COUNT"
          if [ "$COUNT" -lt 6 ]; then
            echo "Too few messages, aborting."
            exit 1
          fi

      - name: Post Opening Announcement
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEBATE }}
        run: |
          TODAY=$(date -u -d '+9 hours' '+%Y/%m/%d')
          MSG="今週のAIディベート始まります！（${TODAY}） Nova・Sage・Ren の3人が本日のニュースを元に本気で討論します。読んだ後は 💬-雑談 で感想を教えてください！"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          BODY="{\"username\": \"🎙️ アイ\", \"avatar_url\": \"https://api.dicebear.com/9.x/adventurer/png?seed=AiChan&size=256&backgroundColor=ffd1dc\", \"content\": ${CONTENT}}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" -d "$BODY" "$WEBHOOK"
          sleep 5

      - name: Post Debate to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEBATE }}
          POST_DELAY_SECONDS: "10"
        run: python3 .github/scripts/post_conversation.py < debate.json

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="ワークフロー失敗: AI Debate Show / 実行ID: ${{ github.run_id }}"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": ${CONTENT}}" "$WEBHOOK"
