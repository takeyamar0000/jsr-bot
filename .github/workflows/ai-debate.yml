name: AI Debate Show (Lv.3)

on:
  schedule:
    - cron: '57 11 * * 3'   # JST 水曜 20:57
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Debate Script (JSON)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y年%-m月%-d日')
          PROMPT=$(cat <<ENDPROMPT
          あなたは3人のAIキャラクターによるディベートの脚本家です。

          キャラクター設定:
          - Nova（ノバ）: 公平な司会者。口調は「次はどうでしょう？」「まとめると？」。
          - Sage（セージ）: 肯定・賛成派。口調は「〜という点で素晴らしいです」「データを見ると〜」。論理的。
          - Ren（レン）: 懐疑・批判派。口調は「本当にそう？」「でも〜ではないですか？」。鋭い質問が特徴。

          ${TODAY} 時点でのAI界隈の最もホットな論争テーマを1つ選び、3人のディベートを生成してください。
          テーマ例: AIは仕事を奪うか、AGIは10年以内に来るか、AIの著作権問題 等
          ただし今週のニュースに関連するテーマを優先してください。

          ルール:
          - 純粋なJSONのみ出力。説明文・前置きは一切不要
          - 形式: [{"speaker": "Nova", "message": "..."}, ...]
          - 最初にNovaがテーマを紹介する1メッセージを入れる
          - 10〜14メッセージ（Nova→Sage→Ren→Nova→... の流れ）
          - 各メッセージ200字以内
          - 専門用語は括弧で解説、絵文字を適度に使用
          - 最後はNovaが「みなさんはどう思いますか？ 雑談チャンネルで教えてください！」で締める
          ENDPROMPT
          )
          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > raw_debate.txt
          echo "Raw output length: $(wc -c < raw_debate.txt)"

      - name: Extract JSON
        run: |
          python3 .github/scripts/extract_json.py < raw_debate.txt > debate.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('debate.json'))))")
          echo "Messages: $COUNT"
          if [ "$COUNT" -lt 6 ]; then
            echo "Too few messages, aborting."
            exit 1
          fi

      - name: Post Opening Announcement
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEBATE }}
        run: |
          echo "Webhook URL length: ${#WEBHOOK}"
          TODAY=$(date -u -d '+9 hours' '+%Y/%m/%d')
          MSG="今週のAIディベート始まります！（${TODAY}） Nova・Sage・Ren の3人が本気で討論。読んだ後は雑談チャンネルで感想を教えてください！"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          BODY="{\"username\": \"Nova\", \"content\": ${CONTENT}}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" -d "$BODY" "$WEBHOOK"
          sleep 3

      - name: Post Debate to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEBATE }}
        run: python3 .github/scripts/post_conversation.py < debate.json

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="ワークフロー失敗: AI Debate Show / 実行ID: ${{ github.run_id }}"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": ${CONTENT}}" "$WEBHOOK"
