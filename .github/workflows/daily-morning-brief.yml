name: Daily AI Morning Brief

on:
  schedule:
    - cron: '57 21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI Morning Brief
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          PROMPT="あなたはアベリアの朝のAIニュース担当です。研修生、AIを学び始めた人、AIに興味のある一般の方に向けて、過去24〜48時間のAIニュースを**専門用語なし**で分かりやすく紹介してください。

          【書き方のルール】
          - 横文字・専門用語は最小限。使うときは必ず日本語でかみ砕く（例：『LLM（文章を生成するAI）』）
          - 『例えば〜』『〜みたいなもの』の比喩を積極的に
          - 事実の羅列ではなく『だから何がすごいのか』『私たちの暮らしにどう関わるのか』を一言添える
          - 小学校高学年にも伝わるトーン。でも幼稚にはしない
          - 読んだ人が『へえ！』『面白そう』と思える言い回し

          【調査対象】過去24〜48時間
          - Anthropic（Claude）/ OpenAI（ChatGPT）/ Google（Gemini）等の大手AI企業の発表
          - 新しいAIの機能やサービス
          - AI研究の注目発見
          - 日本のAI界隈の話題

          【出力フォーマット】厳守

          🌅 **AI朝刊 - ${TODAY}**

          **🔥 今日の注目トピック**
          ・[短い見出し]: [何が起きたか＋『つまり私たちにこう効く』を1-2行]
          ・[短い見出し]: [同様に]

          **📰 AI企業の新しい発表**
          ・[企業名]: [新機能や発表を一般人向けに噛み砕いて1行]

          **🔬 研究の世界から**
          ・[何が面白いか]: [研究の話を『例えば〜』の比喩付きで1-2行]

          **🇯🇵 日本のAI話題**
          ・[話題]: [分かりやすく1行]

          ---
          💡 **今日のひとこと**: [30-50文字、読んだ人を勇気づける or 今日試したくなる一言]

          【絶対条件】
          - 全体1500文字以内
          - 上記フォーマット以降に何も書かない
          - 参考URL・ソース一覧・英語メタデータ一切書かない
          - 『Sources:』『参考:』等の見出し禁止
          - ネタが少ない領域はその項目ごと省略可
          - 不確かな情報は書かない"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > brief.txt
          echo "Raw length: $(wc -c < brief.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < brief.txt > brief-clean.txt
          mv brief-clean.txt brief.txt
          echo "Final char count: $(python3 -c "print(len(open('brief.txt',encoding='utf-8').read()))")"

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_BRIEF }}
        run: |
          CONTENT=$(jq -Rs . < brief.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
