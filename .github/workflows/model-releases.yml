name: Model Releases Watcher

on:
  schedule:
    - cron: '57 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Model Releases Brief
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          PROMPT="あなたはアベリアのAI新製品担当です。過去24時間のAI企業の『新しいもの』発表を、研修生・AI初心者・一般人に向けて分かりやすく紹介してください。

          【書き方のルール】
          - 『新モデルがリリース』ではなく『新しいAIが登場した、これで〇〇ができる』と書く
          - カタカナ専門用語は必ず日本語でかみ砕く
          - 『何がすごいのか』『自分の仕事や生活にどう活かせるか』を必ず添える
          - 具体例を入れる（例：『旅行の計画を任せられる』『長い文章を要約できる』）

          【調査対象】過去24時間
          - Anthropic（Claude）、OpenAI（ChatGPT）、Google（Gemini）、Meta、xAI 等の発表
          - 新しいAIの機能、サービス、ツール

          【判定】
          特筆すべき新発表があった場合のみ投稿。マイナーアップデートや既報の情報はスルー。

          【リリースが無い場合】
          出力の最初の行に必ず 'NO_RELEASES' とだけ書く。それ以外書かない。

          【リリースがある場合のフォーマット】

          🚀 **新しいAIが登場しました - ${TODAY}**

          **[企業名] の [新機能の愛称]**

          **どんなもの？**
          [2-3行で『例えば〜』『つまり〜』を使いながら説明]

          **何がすごい？**
          ・[ポイント1を分かりやすく]
          ・[ポイント2]

          **どう使える？**
          [実際の使い方を具体的な場面で1-2行]

          **試してみたい人は**
          [公式サイトや使い始めの案内を1行]

          ---（新発表が複数あれば繰り返し、最大3件）

          【絶対条件】
          - 全体1500文字以内
          - 参考URL・ソース一覧書かない
          - 不確かな情報は書かない
          - 新発表が無ければ NO_RELEASES のみ出力"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > release.txt
          echo "Raw length: $(wc -c < release.txt)"

      - name: Check for NO_RELEASES
        id: check
        run: |
          FIRST_LINE=$(head -1 release.txt | tr -d '\r\n ')
          if [ "$FIRST_LINE" = "NO_RELEASES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No releases today, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trim and Sanitize (char-safe)
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 .github/scripts/sanitize.py < release.txt > release-clean.txt
          mv release-clean.txt release.txt

      - name: Post to Discord
        if: steps.check.outputs.skip != 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_MODEL }}
        run: |
          CONTENT=$(jq -Rs . < release.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
