name: AI Glossary (Daily Term)

on:
  schedule:
    # JST 08:27 毎日 = UTC 23:27 前日
    - cron: '27 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Select Today's Term from List
        id: pick
        run: |
          TERMS_FILE=".github/data/glossary-terms.json"
          TOTAL=$(jq '.terms | length' "$TERMS_FILE")
          DAY_OF_YEAR=$(date -u -d '+9 hours' '+%j')
          # 10# prefix: 009 等の先頭0を8進数解釈させない
          INDEX=$(( (10#$DAY_OF_YEAR - 1) % TOTAL ))

          TERM_JP=$(jq -r ".terms[$INDEX].jp" "$TERMS_FILE")
          TERM_EN=$(jq -r ".terms[$INDEX].en" "$TERMS_FILE")
          TERM_CAT=$(jq -r ".terms[$INDEX].category" "$TERMS_FILE")
          TERM_HINT=$(jq -r ".terms[$INDEX].hint" "$TERMS_FILE")

          echo "index=$INDEX / total=$TOTAL"
          echo "picked: $TERM_JP ($TERM_EN) / $TERM_CAT"

          {
            echo "jp=$TERM_JP"
            echo "en=$TERM_EN"
            echo "category=$TERM_CAT"
            echo "hint=$TERM_HINT"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Term Explanation
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TERM_JP: ${{ steps.pick.outputs.jp }}
          TERM_EN: ${{ steps.pick.outputs.en }}
          TERM_CAT: ${{ steps.pick.outputs.category }}
          TERM_HINT: ${{ steps.pick.outputs.hint }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')

          PROMPT="あなたはアベリアの研修生・AI初心者・一般人向けの『AI用語辞典』担当です。今日の用語は既に指定されています。下記の用語について、WebSearchで最新の正確な情報を確認した上で、分かりやすく解説してください。

          【今日解説する用語】
          - 日本語: ${TERM_JP}
          - 英語: ${TERM_EN}
          - カテゴリ: ${TERM_CAT}
          - 参考ヒント: ${TERM_HINT}

          ※ 用語選択は完了しています。別の用語を選んだり、複数を紹介したりしないでください。

          【書き方のルール】
          - 専門用語をさらに専門用語で説明しない。必ず日常の言葉や比喩で
          - 『例えるなら〜』『〜みたいなもの』を必ず入れる
          - 小学校高学年が読んでもニコッとする親しみやすさ
          - 200-400字程度にコンパクトに

          【出力フォーマット】厳守

          📖 **今日のAI用語 - ${TODAY}**

          ## ${TERM_JP}（英語: ${TERM_EN}）

          **🌱 要するに？**
          [1-2文で核をつかむ]

          **🎨 例えるなら**
          [比喩で説明、2-3文]

          **👀 こんなところで登場する**
          ・[具体例1]
          ・[具体例2]

          **💡 ワンポイント**
          [30-60字、覚え方のコツ or 関連用語の繋がり]

          【絶対条件】
          - 全体1500文字以内
          - 上記フォーマット以降に何も書かない
          - 参考URL・ソース一覧書かない
          - 『Sources:』『参考:』等の見出し禁止
          - 指定された用語のみ解説（別用語への切り替え・複数紹介は禁止）
          - 不確かな情報は書かない"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > term.txt
          echo "Raw length: $(wc -c < term.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < term.txt > term-clean.txt
          mv term-clean.txt term.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_GLOSSARY }}
        run: |
          CONTENT=$(jq -Rs . < term.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
