name: AI Video & Podcast Weekly (Saturday)

on:
  schedule:
    # JST 土曜 10:27 = UTC 土曜 01:27
    - cron: '27 1 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Video & Podcast Summary
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          WEEK_START=$(date -u -d '+9 hours -6 days' '+%Y-%m-%d')

          PROMPT="あなたはアベリアの『今週のAI動画・Podcast』担当です。研修生・AI初心者・一般人に向けて、過去7日間（${WEEK_START}〜${TODAY}）に配信されたAI関連の動画/ポッドキャストから3-4本を選び、紹介してください。

          【調査対象】過去7日間
          ## 英語系Podcast（公式サイトやApple Podcasts等で最新エピソード確認）
          - Latent Space（swyx）
          - No Priors（Sarah Guo & Elad Gil）
          - Lex Fridman Podcast
          - Practical AI
          - Dwarkesh Podcast
          - The AI Breakdown
          - AI Engineering Podcast

          ## 英語系YouTube
          - Two Minute Papers
          - AI Explained
          - Fireship
          - Matthew Berman
          - Nate Gentile

          ## 日本語系
          - 落合陽一（YouTubeチャンネル）
          - 松尾研究室 関連配信
          - 安野貴博（X/Spaces等）
          - 茶番AI、AI解説系YouTuber
          - 日本人のAI Podcast（でみやーじ等）

          【選ぶ基準】
          - 過去7日以内に配信されたエピソード/動画
          - 研修生・初心者が聞いて/見て学びになるもの
          - バラエティを意識（英語1-2本、日本語1-2本など）
          - 『忙しくて全部見る時間ない人に、これだけは聞いてほしい』目線

          【書き方のルール】
          - 専門用語は最小限。カタカナは日本語で補足
          - 『何が話題か』『なぜ研修生に聴く価値があるか』を添える
          - 時間がない人でも要点が分かるよう要約

          【出力フォーマット】厳守

          🎙️ **今週のAI動画・Podcast** | ${WEEK_START}〜${TODAY}

          ## 【1】[配信名] - [エピソード/動画タイトル]
          **形式**: Podcast / YouTube / ライブ配信
          **配信日**: YYYY-MM-DD
          **尺**: 約X分 or X時間（わかれば）
          **聴きどころ** 🎯
          [100-150字で要点をわかりやすく]
          **研修生へのひとこと** 💡
          [50-80字で『ここが参考になる』]
          **🔗** [URL]

          ## 【2】...
          同じフォーマットで繰り返し（最大4本、3本でもOK）

          ---
          💬 **今週末のおすすめ1本**: [30-50字、複数の中から特に推す1本]

          【絶対条件】
          - 全体1800文字以内
          - 3〜4本に絞る（5本以上禁止）
          - URLは必ず実在の正確なもの。記憶で書かずWebSearchで確認したURL
          - 参考URLリストは上記フォーマット内の🔗のみ
          - 『Sources:』『参考:』等の見出し禁止
          - 不確かな情報は書かない（配信日・尺は分からなければ省略OK）
          - 出力の1文字目から🎙️で始める。前置き・メタコメント一切書かない"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > videos.txt
          echo "Raw length: $(wc -c < videos.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < videos.txt > videos-clean.txt
          mv videos-clean.txt videos.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_VIDEO }}
        run: |
          CONTENT=$(jq -Rs . < videos.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
