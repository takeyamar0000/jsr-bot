name: AI Video & Podcast Daily

on:
  schedule:
    # JST 毎日 10:27 = UTC 01:27
    - cron: '27 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Video & Podcast Summary
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')

          PROMPT="あなたはアベリアの『今日のAI動画・Podcast』担当です。研修生・AI初心者・一般人に向けて、過去24〜48時間に配信された動画/ポッドキャストから2-3本を選んで紹介してください。

          【調査対象】過去24〜48時間に配信されたもの

          ## 日本語系 優先（最低1本は日本語から）
          - **チャエン** (@masahirochaen / AI系YouTuber、最新AIニュース解説)
          - **みかみ東大退学させられた男** (YouTube: https://www.youtube.com/@みかみ東大退学させられた男 / 元東大の視点からAI・テクノロジー解説)
          - 落合陽一 公式YouTubeチャンネル
          - 松尾研究室 関連配信
          - 安野貴博 配信（YouTube / X Spaces）
          - 茶番AI、その他日本のAI系YouTuber/Podcaster

          ## 英語系 補助（話題性が高いもののみ）
          - Podcast: Latent Space / No Priors / Lex Fridman / The AI Breakdown / Dwarkesh Podcast / Practical AI
          - YouTube: Two Minute Papers / AI Explained / Matthew Berman / Fireship

          【選ぶ基準】
          - 過去24〜48時間以内に公開された新規コンテンツ
          - 研修生・初心者が見て/聴いて学びになる
          - **日本語コンテンツ最低1本を含める**（チャエンさん・みかみさん優先）
          - 英語は特に話題のものだけ1-2本
          - 全体で2-3本に絞る

          【書き方のルール】
          - 専門用語は最小限。カタカナは日本語で補足
          - 『何が話題か』『なぜ研修生に価値があるか』を添える
          - 忙しい人でも要点が分かるよう簡潔に

          【出力フォーマット】厳守

          🎙️ **今日のAI動画・配信 - ${TODAY}**

          ## 【1】[配信者名/チャンネル名] - [タイトル]
          **形式**: YouTube / Podcast / ライブ配信
          **配信日**: YYYY-MM-DD
          **尺**: 約X分（わかれば）
          **見どころ** 🎯
          [80-120字で要点]
          **研修生へのひとこと** 💡
          [30-50字で参考になるポイント]
          **🔗** [URL]

          ## 【2】...
          同じフォーマットで繰り返し（全2-3本）

          ---
          💬 **今日の推し1本**: [30-50字、複数の中から特に推す1本]

          【絶対条件】
          - 全体1800文字以内
          - 2-3本に絞る（4本以上禁止）
          - URLは必ず実在の正確なもの。記憶で書かずWebSearchで確認したURL
          - 見つからなければ直近1週間まで範囲拡大、それでも無ければ本数を減らしてOK
          - 参考URLは上記フォーマット内の🔗のみ
          - 『Sources:』『参考:』等の見出し禁止
          - 不確かな情報は書かない（配信日・尺は分からなければ省略OK）
          - 出力の1文字目から🎙️で始める。前置き・メタコメント一切書かない"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > videos.txt
          echo "Raw length: $(wc -c < videos.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < videos.txt > videos-clean.txt
          mv videos-clean.txt videos.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_VIDEO }}
        run: |
          CONTENT=$(jq -Rs . < videos.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
