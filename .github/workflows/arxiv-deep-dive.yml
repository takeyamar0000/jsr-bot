name: ArXiv Deep Dive (Sunday Morning)

on:
  schedule:
    - cron: '57 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Paper Deep Dive
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          PROMPT="あなたはアベリアの『今週の注目AI研究』担当です。過去7日間に世界で発表されたAI研究（ArXiv等）から、研修生・AI初心者・一般人に『わあ、そんなことできるんだ！』と思わせる1本を選び、分かりやすく解説してください。

          【書き方のルール】
          - 論文紹介ではなく『面白い発見の紹介』として書く
          - 専門用語・カタカナは最小限。使うときは必ず日本語でかみ砕く
          - 『例えば〜』『要するに〜』『〜みたいなもの』の比喩を多用
          - 小学校高学年が聞いても面白がる内容に
          - 数式・難しい概念には踏み込まない。『だから何ができるか』が中心

          【選ぶ基準】
          - 『すごい』『面白い』『役立ちそう』が伝わりやすい研究
          - 実用的・応用しやすい内容
          - 発表元の信頼性（大学・有名研究機関・大手AI企業）
          - 極端に数学的な純理論系は避ける

          【出力フォーマット】

          📄 **今週の注目AI研究 - ${TODAY}**

          **[研究の内容を一言で表すキャッチコピー（30-40文字）]**

          **📌 要するに何の研究？**
          [2-3行で、専門知識なしの人にも核を伝える]

          **🎯 何がすごい？（例え話で）**
          [3-4行、『例えば〜』『〜みたいなもの』を使って、すごさを具体的に]

          **💡 どう役に立つ？**
          [2-3行、実際の生活や仕事でこう使えるかも、という話]

          **📎 研究情報**
          ・研究チーム: [研究者名 / 所属大学・機関]
          ・発表日: [日付]
          ・原題（英語）: [論文タイトル]

          ---
          💬 **今週のひとこと**: [30-50文字、ワクワクが残る締めの言葉]

          【絶対条件】
          - 全体1500文字以内
          - 論文は1本だけ
          - 参考URL・ソース一覧書かない（研究情報は上記フォーマット内のみ）
          - 不確かな情報は書かない
          - 『貢献』『手法』『ベンチマーク』などの学術用語は避ける"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > paper.txt
          echo "Raw length: $(wc -c < paper.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < paper.txt > paper-clean.txt
          mv paper-clean.txt paper.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_PAPER }}
        run: |
          CONTENT=$(jq -Rs . < paper.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
