name: AI Tools of the Week (Friday Evening)

on:
  schedule:
    # JST 金曜 18:57 = UTC 金曜 09:57
    - cron: '57 9 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Select This Week's Tool from List
        id: pick
        run: |
          TOOLS_FILE=".github/data/ai-tools.json"
          TOTAL=$(jq '.tools | length' "$TOOLS_FILE")
          WEEK_OF_YEAR=$(date -u -d '+9 hours' '+%V')
          INDEX=$(( 10#$WEEK_OF_YEAR % TOTAL ))

          TOOL_NAME=$(jq -r ".tools[$INDEX].name" "$TOOLS_FILE")
          TOOL_CAT=$(jq -r ".tools[$INDEX].category" "$TOOLS_FILE")
          TOOL_URL=$(jq -r ".tools[$INDEX].url" "$TOOLS_FILE")
          TOOL_HINT=$(jq -r ".tools[$INDEX].hint" "$TOOLS_FILE")

          echo "index=$INDEX / total=$TOTAL"
          echo "picked: $TOOL_NAME ($TOOL_CAT)"

          {
            echo "name=$TOOL_NAME"
            echo "category=$TOOL_CAT"
            echo "url=$TOOL_URL"
            echo "hint=$TOOL_HINT"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Tool Introduction
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TOOL_NAME: ${{ steps.pick.outputs.name }}
          TOOL_CAT: ${{ steps.pick.outputs.category }}
          TOOL_URL: ${{ steps.pick.outputs.url }}
          TOOL_HINT: ${{ steps.pick.outputs.hint }}
        run: |
          unset ANTHROPIC_API_KEY
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')

          PROMPT="あなたはアベリアの『今週のAIツール紹介』担当です。今週紹介するツールは既に指定されています。下記のツールについて、WebSearchで最新の料金・機能・使用感を確認した上で、分かりやすく紹介してください。

          【今週紹介するツール】
          - ツール名: ${TOOL_NAME}
          - カテゴリ: ${TOOL_CAT}
          - 公式URL: ${TOOL_URL}
          - 参考ヒント: ${TOOL_HINT}

          ※ ツール選択は完了しています。別のツールへの差し替えや複数ツール紹介は禁止です。

          【書き方のルール】
          - 専門用語は最小限、日常語で
          - 『どんな場面で活躍するか』『研修生が週末に試すなら何をするか』を具体的に
          - 料金・無料枠はWebSearchで最新を確認。不確かなら『要確認』と明記

          【出力フォーマット】厳守

          🧰 **今週のAIツール - ${TODAY}**

          ## ${TOOL_NAME}

          **カテゴリ**: ${TOOL_CAT}
          **料金**: [無料枠の範囲 / 有料プラン金額（要検証）]
          **公式**: ${TOOL_URL}

          **🌟 どんなツール？**
          [2-3行で核を説明、比喩使って]

          **💡 何ができる？**
          ・[具体例1：誰がどういう時に使うか]
          ・[具体例2]
          ・[具体例3]

          **🚀 始め方（3ステップ）**
          1. [手順1]
          2. [手順2]
          3. [手順3]

          **🎯 研修生へのオススメ理由**
          [60-100字、アベリア研修生にとって何が有益か]

          ---
          💬 **今週末のチャレンジ**: [30-50字、試してみる具体的な小さなアクション]

          【絶対条件】
          - 全体1500文字以内
          - 指定されたツール1つのみ紹介（別ツールへの差し替え・複数紹介禁止）
          - 参考URL・ソース一覧は上記フォーマット内の公式URLのみ
          - 『Sources:』『参考:』等の見出し禁止
          - 不確かな情報（料金変更など）は『要確認』を添える"

          claude -p "$PROMPT" --allowedTools "WebSearch,WebFetch" > tool.txt
          echo "Raw length: $(wc -c < tool.txt)"

      - name: Trim and Sanitize (char-safe)
        run: |
          python3 .github/scripts/sanitize.py < tool.txt > tool-clean.txt
          mv tool-clean.txt tool.txt

      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_TOOLS }}
        run: |
          CONTENT=$(jq -Rs . < tool.txt)
          BODY="{\"content\": $CONTENT}"
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" "$WEBHOOK"

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: |
          MSG="🚨 **ワークフロー失敗通知**

          **ワークフロー**: ${{ github.workflow }}
          **実行ID**: ${{ github.run_id }}
          **詳細ログ**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **発生時刻**: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')

          ログ確認 → 必要なら手動再発火を検討してください。"
          CONTENT=$(echo "$MSG" | jq -Rs .)
          curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"content\": $CONTENT}" "$WEBHOOK"
